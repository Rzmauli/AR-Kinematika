<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
Simulasi AR Jalan Tol
</title>

<!-- AFRAME -->

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- CHART -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- =========================
     TOGGLE BUTTON
========================= -->

<button id="toggleUI">
☰ MENU
</button>

<!-- =========================
     PANEL UI
========================= -->

<div id="panel">

<h1>
Analisis Fisika Jarak Henti
</h1>

<!-- KECEPATAN -->

<label>
Kecepatan Awal Mobil B:
</label>

<!-- USIA -->

<label>
Usia Pengemudi:
</label>

<select id="ageSelect">

<option value="young">
18 - 25 Tahun
</option>

<option value="adult" selected>
26 - 45 Tahun
</option>

<option value="old">
46 - 70 Tahun
</option>

</select>

<!-- SLIDER -->

<input
type="range"
min="40"
max="140"
value="90"
id="speedSlider"
class="slider">

<p>
Target Kecepatan:
<span id="speedValue">
90
</span>
km/jam
</p>

<!-- SPEEDOMETER -->

<div id="speedometer">
0 km/jam
</div>

<!-- BOX FISIKA -->

<div class="box">

<p>
Waktu Reaksi:
<span id="reactionTime">
1.5
</span>
s
</p>

<p>
Jarak Reaksi:
<span id="reactionDistance">
0
</span>
m
</p>

<p>
Jarak Pengereman:
<span id="brakingDistance">
0
</span>
m
</p>

<p class="total">
Total Jarak Henti:
<span id="stoppingDistance">
0
</span>
m
</p>

</div>

<!-- BUTTON -->

<button id="startBtn">
MULAI SIMULASI
</button>

<button id="resetBtn">
RESET
</button>

<!-- STATUS -->

<h2 id="status">
Status: Siap
</h2>

<!-- GRAFIK -->

<canvas id="velocityChart">
</canvas>

</div>

<!-- =========================
     AFRAME SCENE
========================= -->

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="
antialias:true;
alpha:true;">

<!-- =========================
     ASSETS
========================= -->

<a-assets>

<!-- MODEL -->

<a-asset-item
id="carBlue"
src="models/carBlue.glb">
</a-asset-item>

<a-asset-item
id="carRed"
src="models/carRed.glb">
</a-asset-item>

<!-- TEXTURE -->

<img
id="roadTexture"
src="textures/asphalt.jpg">

<!-- AUDIO -->

<audio
id="brakeSound"
src="sounds/brake.mp3">
</audio>

</a-assets>

<!-- =========================
     SKY
========================= -->

<a-sky color="#95a5a6">
</a-sky>

<!-- =========================
     LIGHT
========================= -->

<a-entity
light="
type:ambient;
intensity:1.2">
</a-entity>

<a-entity
light="
type:directional;
intensity:1"
position="5 10 7">
</a-entity>

<!-- =========================
     JALAN
========================= -->

<a-plane
rotation="-90 0 0"
width="30"
height="10000"
material="
src:#roadTexture;
repeat:50 500;
roughness:1"
position="0 -1 -5000">
</a-plane>

<!-- GARIS TENGAH -->

<a-entity id="markaContainer">
</a-entity>

<!-- PEMBATAS KIRI -->

<a-box
position="-8 0 -5000"
width="0.5"
height="1"
depth="10000"
color="#bdc3c7">
</a-box>

<!-- PEMBATAS KANAN -->

<a-box
position="8 0 -5000"
width="0.5"
height="1"
depth="10000"
color="#bdc3c7">
</a-box>

<!-- RUMPUT -->

<a-plane
rotation="-90 0 0"
width="100"
height="10000"
color="#7aa874"
position="0 -1.02 -5000">
</a-plane>

<!-- =========================
     HUJAN
========================= -->

<a-entity id="rainContainer">
</a-entity>

<!-- =========================
     KABUT
========================= -->

<a-entity
fog="
type:linear;
color:#95a5a6;
near:10;
far:120">
</a-entity>

<!-- =========================
     MOBIL DEPAN
========================= -->

<a-entity
id="mobilA"
gltf-model="#carBlue"
position="0 0 -120"
rotation="0 180 0"
scale="0.7 0.7 0.7">
</a-entity>

<!-- =========================
     MOBIL BELAKANG
========================= -->

<a-entity
id="mobilB"
gltf-model="#carRed"
position="0 0 0"
rotation="0 180 0"
scale="0.7 0.7 0.7">
</a-entity>

<!-- =========================
     CAMERA
========================= -->

<a-entity
id="cameraRig"
position="0 3 12">

<a-camera>
</a-camera>

</a-entity>

</a-scene>

<!-- =========================
     SCRIPT
========================= -->

<script src="Script.js">
</script>

<!-- =========================
     TOGGLE PANEL
========================= -->

<script>

const toggleBtn =
document.getElementById(
"toggleUI"
);

const panel =
document.getElementById(
"panel"
);

toggleBtn.onclick = () => {

panel.classList.toggle(
"hidePanel"
);

};

</script>

</body>
</html>
