<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
Simulasi AR Jalan Tol
</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
     TOGGLE BUTTON
========================= -->

<button id="toggleUI">
☰ MENU
</button>

<!-- =========================
     PANEL
========================= -->

<div id="panel">

<h1>
Analisis Fisika Jarak Henti
</h1>

<label>
Usia Pengemudi:
</label>

<select id="ageSelect">

<option value="young">
18 - 25 Tahun
</option>

<option value="adult" selected>
26 - 45 Tahun
</option>

<option value="old">
46 - 70 Tahun
</option>

</select>

<label>
Kecepatan Awal Mobil B:
</label>

<input
type="range"
min="40"
max="140"
value="90"
id="speedSlider">

<p>
Target Kecepatan:
<span id="speedValue">
90
</span>
km/jam
</p>

<!-- SPEEDOMETER -->

<div id="speedometer">
0 km/jam
</div>

<!-- BOX -->

<div class="box">

<p>
Waktu Reaksi:
<span id="reactionTime">
1.50
</span>
s
</p>

<p>
Jarak Reaksi:
<span id="reactionDistance">
0
</span>
m
</p>

<p>
Jarak Pengereman:
<span id="brakingDistance">
0
</span>
m
</p>

<p class="total">
Total Jarak Henti:
<span id="stoppingDistance">
0
</span>
m
</p>

</div>

<!-- BUTTON -->

<button id="startBtn">
MULAI SIMULASI
</button>

<button id="resetBtn">
RESET
</button>

<h2 id="status">
Status: Siap
</h2>

<canvas id="velocityChart">
</canvas>

</div>

<!-- =========================
     SCENE
========================= -->

<a-scene
embedded
renderer="
antialias:true;
colorManagement:true;"

fog="
type:linear;
color:#95a5a6;
near:20;
far:120">
<!-- =========================
     ASSETS
========================= -->

<a-assets>

<img
id="roadTexture"
src="textures/asphalt.jpg">

<audio
id="brakeSound"
src="sounds/brake.mp3">
</audio>

<a-asset-item
id="carBlue"
src="models/carBlue.glb">
</a-asset-item>

<a-asset-item
id="carRed"
src="models/carRed.glb">
</a-asset-item>

</a-assets>

<!-- SKY -->

<a-sky color="#95a5a6">
</a-sky>

<!-- LIGHT -->

<a-light
type="ambient"
intensity="1">
</a-light>

<a-light
type="directional"
intensity="1"
position="0 10 5">
</a-light>

<!-- KABUT -->

<a-entity
fog="
type:linear;
color:#95a5a6;
near:20;
far:120">
</a-entity>

<!-- JALAN -->

<a-plane
position="0 -1 -5000"
rotation="-90 0 0"
width="20"
height="10000"
src="#roadTexture"
repeat="10 1000">
</a-plane>

<!-- BATAS -->

<a-box
position="-10 0 -5000"
width="0.2"
height="1"
depth="10000"
color="#95a5a6">
</a-box>

<a-box
position="10 0 -5000"
width="0.2"
height="1"
depth="10000"
color="#95a5a6">
</a-box>

<!-- RUMPUT -->

<a-plane
position="-60 -1.05 -5000"
rotation="-90 0 0"
width="100"
height="10000"
color="#4d6a41">
</a-plane>

<a-plane
position="60 -1.05 -5000"
rotation="-90 0 0"
width="100"
height="10000"
color="#4d6a41">
</a-plane>

<!-- MARKA -->

<a-entity id="markaContainer">
</a-entity>

<!-- MOBIL A -->

<a-entity
id="mobilA"
gltf-model="#carBlue"
position="0 0 -120"
scale="0.7 0.7 0.7"
rotation="0 180 0">
</a-entity>

<!-- MOB
