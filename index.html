<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi AR Tol - Fisika Presisi & Grafik Kecepatan</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.19.0/meshopt_decoder.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* GAYA UNTUK TOMBOL TOGGLE */
        #toggleBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.3s;
        }

        #toggleBtn:hover {
            background: #2c3e50;
        }

        /* PANEL KONTROL */
        #panel {
            position: absolute;
            top: 55px; /* Diturunkan agar tidak menabrak tombol toggle */
            left: 10px;
            width: 340px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            z-index: 999;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 85vh;
            overflow-y: auto;
            transition: transform 0.3s ease-in-out; /* Animasi geser */
        }

        /* KELAS UNTUK MENYEMBUNYIKAN PANEL */
        #panel.hidden {
            transform: translateX(-120%);
        }

        /* RESPONSIVITAS UNTUK HP */
        @media (max-width: 768px) {
            #panel {
                width: 85vw;
                max-width: 340px;
                max-height: 80vh;
            }
        }

        .slider {
            width: 100%;
        }

        button.action-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        #startBtn { background: #2ecc71; color: white; }
        #resetBtn { background: #e67e22; color: white; }
        #status { margin-top: 8px; color: #2c3e50; font-weight: bold; font-size: 14px; }
        canvas { margin-top: 15px; background: #fafafa; border-radius: 5px; }
        
        #speedometer {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #222;
            margin: 8px 0;
            background: #f1f2f6;
            padding: 5px;
            border-radius: 5px;
        }
        .info-text { margin: 4px 0; font-size: 13px; color: #34495e; }
    </style>
</head>

<body>

    <button id="toggleBtn">✖ Sembunyikan Panel</button>

    <div id="panel">
        <h1 style="font-size: 18px; margin-top: 0; color: #2c3e50;">Analisis Fisika Jarak Henti</h1>
        
        <label style="font-size:13px;font-weight:bold;">Usia Pengemudi:</label>
        <select id="ageSelect" class="slider">
            <option value="young">18 - 25 Tahun</option>
            <option value="adult" selected>26 - 45 Tahun</option>
            <option value="old">46 - 70 Tahun</option>
        </select>
        
        <br><br>
        <label style="font-size: 13px; font-weight: bold;">Kecepatan Awal Mobil B:</label>
        <input type="range" min="40" max="140" value="90" id="speedSlider" class="slider">
        <p class="info-text">Target Kecepatan: <span id="speedValue">90</span> km/jam</p>
        
        <h2 id="speedometer">0 km/jam</h2>

        <div style="background: #ecf0f1; padding: 8px; border-radius: 5px; margin-top: 5px;">
            <p class="info-text">Waktu Reaksi ($t_r$): <span id="reactionTime">1.50</span> s</p>
            <p class="info-text">Jarak Reaksi ($d_r$): <span id="reactionDistance">-</span> m</p>
            <p class="info-text">Jarak Pengereman ($d_b$): <span id="brakingDistance">-</span> m</p>
            <p class="info-text" style="font-weight: bold; color: #c0392b;">Total Jarak Henti ($d_s$): <span id="stoppingDistance">-</span> m</p>
        </div>

        <button id="startBtn" class="action-btn">MULAI SIMULASI</button>
        <button id="resetBtn" class="action-btn">RESET</button>
        <p id="status">Status: Siap</p>

        <canvas id="velocityChart" width="300" height="200"></canvas>
    </div>

    <a-scene embedded renderer="antialias: true; colorManagement: true;" fog="type: exponential; color: #7f8c8d; density: 0.015">
        <a-assets>
            <img id="roadTexture" src="textures/asphalt.jpg">
            <audio id="brakeSound" src="sounds/brake.mp3"></audio>
            <a-asset-item id="carBlue" src="models/carBlue.glb"></a-asset-item>
            <a-asset-item id="carRed" src="models/carRed.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" intensity="0.8" position="0 10 5"></a-light>
        <a-sky id="envSky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg" material="color: #7f8c8d"></a-sky>

        <a-entity id="rainEffect" custom-rain></a-entity>

        <a-plane position="0 -1 -5000" rotation="-90 0 0" width="20" height="10000" src="#roadTexture" repeat="5 1000"></a-plane>
        <a-box position="-10 0 -5000" width="0.2" height="1" depth="10000" color="#95a5a6"></a-box>
        <a-box position="10 0 -5000" width="0.2" height="1" depth="10000" color="#95a5a6"></a-box>
        <a-plane position="-60 -1.05 -5000" rotation="-90 0 0" width="100" height="10000" color="#4d6a41"></a-plane>
        <a-plane position="60 -1.05 -5000" rotation="-90 0 0" width="100" height="10000" color="#4d6a41"></a-plane>

        <a-entity id="markaContainer"></a-entity>

        <a-entity id="mobilA" gltf-model="#carBlue" position="0 0 -120" scale="0.7 0.7 0.7" rotation="0 180 0"></a-entity>
        <a-entity id="mobilB" gltf-model="#carRed" position="0 0 0" scale="0.7 0.7 0.7" rotation="0 180 0"></a-entity>
        <a-entity camera position="0 2 6"></a-entity>
    </a-scene>

    <script>
        /* ===================================================
           LOGIKA BUKA-TUTUP PANEL
        =================================================== */
        const toggleBtn = document.getElementById("toggleBtn");
        const panel = document.getElementById("panel");

        toggleBtn.addEventListener("click", () => {
            panel.classList.toggle("hidden");
            
            if (panel.classList.contains("hidden")) {
                toggleBtn.innerHTML = "☰ Tampilkan Panel";
                toggleBtn.style.background = "#2ecc71";
            } else {
                toggleBtn.innerHTML = "✖ Sembunyikan Panel";
                toggleBtn.style.background = "#34495e";
            }
        });

        /* ===================================================
           KOMPONEN HUJAN RINGAN & STABIL
        =================================================== */
        AFRAME.registerComponent('custom-rain', {
            init: function () {
                this.drops = [];
                for (let i = 0; i < 350; i++) {
                    const geometry = new THREE.BoxGeometry(0.02, 0.6, 0.02);
                    const material = new THREE.MeshBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.3 });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set((Math.random() - 0.5) * 40, Math.random() * 20, (Math.random() - 0.5) * 40);
                    this.el.object3D.add(mesh);
                    this.drops.push(mesh);
                }
            },
            tick: function (time, timeDelta) {
                const dt = Math.min(timeDelta, 100) / 1000;
                const fallSpeed = 22 * dt; 
                for (let i = 0; i < this.drops.length; i++) {
                    this.drops[i].position.y -= fallSpeed;
                    if (this.drops[i].position.y < 0) this.drops[i].position.y = 20;
                }
            }
        });

        /* ===================================================
           KONFIGURASI GRAFIK KECEPATAN VS WAKTU (CHART.JS)
        =================================================== */
        const ctx = document.getElementById("velocityChart").getContext("2d");
        const velocityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: 'Kecepatan Mobil B (km/jam)',
                    data: [], 
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                animation: false, 
                scales: {
                    x: { title: { display: true, text: 'Waktu (detik)', font: { size: 10 } } },
                    y: { beginAtZero: true, title: { display: true, text: 'Kecepatan (km/jam)', font: { size: 10 } } }
                }
            }
        });

        /* ===================================================
           VARIABEL & LOGIKA MATEMATIKA FISIKA MURNI
        =================================================== */
        const speedSlider = document.getElementById("speedSlider");
        const speedValue = document.getElementById("speedValue");
        const reactionDistanceText = document.getElementById("reactionDistance");
        const brakingDistanceText = document.getElementById("brakingDistance");
        const stoppingDistanceText = document.getElementById("stoppingDistance");
        const statusText = document.getElementById("status");
        const speedometer = document.getElementById("speedometer");

        const mobilA = document.querySelector("#mobilA");
        const mobilB = document.querySelector("#mobilB");
        const envSky = document.querySelector("#envSky");
        const rainEffect = document.querySelector("#rainEffect");

        const t_r = 1.5;     
        const mu = 0.35;    
        const g = 9.81;     
        const speedA_ms = 50 / 3.6; 

        let speedB_kmh = 90; 
        let v0 = speedB_kmh / 3.6; 
        let zA = -120; 
        let zB = 0;    
        
        let currentSpeedB = 0;
        let simTime = 0;
        let running = false;
        let brakingActive = false;
        let lastTime = 0;

        function calculatePhysics() {
            speedB_kmh = parseInt(speedSlider.value);
            v0 = speedB_kmh / 3.6; 
            speedValue.innerHTML = speedB_kmh;

            let reactionDistance = v0 * t_r;                     
            let brakingDistance = (v0 * v0) / (2 * mu * g);       
            let stoppingDistance = reactionDistance + brakingDistance; 

            reactionDistanceText.innerHTML = reactionDistance.toFixed(2);
            brakingDistanceText.innerHTML = brakingDistance.toFixed(2);
            stoppingDistanceText.innerHTML = stoppingDistance.toFixed(2);
        }

        speedSlider.addEventListener("input", calculatePhysics);

        /* ===================================================
           TOMBOL RUN SIMULASI
        =================================================== */
        document.getElementById("startBtn").onclick = () => {
            if (running) return;
            
            velocityChart.data.labels = [];
            velocityChart.data.datasets[0].data = [];
            velocityChart.update();

            running = true;
            brakingActive = false;
            simTime = 0;
            currentSpeedB = v0; 
            zA = -120;
            zB = 0;
            
            statusText.innerHTML = "Status: Fase Reaksi Pengemudi...";
            statusText.style.color = "#3498db";
            
            lastTime = performance.now();
            animate();
            
            // Opsional: Tutup panel otomatis saat simulasi jalan agar layar luas
            if (window.innerWidth <= 768 && !panel.classList.contains("hidden")) {
                toggleBtn.click();
            }
        };

        /* ===================================================
           TOMBOL RESET
        =================================================== */
        document.getElementById("resetBtn").onclick = () => {
            running = false;
            brakingActive = false;
            zA = -120;
            zB = 0;
            currentSpeedB = 0;

            mobilA.setAttribute("position", `0 0 ${zA}`);
            mobilB.setAttribute("position", `0 0 ${zB}`);
            
            const camera = document.querySelector("[camera]");
            camera.setAttribute("position", "0 2 6");
            if (envSky) envSky.setAttribute("position", "0 0 0");
            if (rainEffect) rainEffect.setAttribute("position", "0 0 0");

            speedometer.innerHTML = "0 km/jam";
            statusText.innerHTML = "Status: Direset";
            statusText.style.color = "#2c3e50";

            velocityChart.data.labels = [];
            velocityChart.data.datasets[0].data = [];
            velocityChart.update();

            const brakeAudio = document.getElementById("brakeSound");
            if (brakeAudio) { brakeAudio.pause(); brakeAudio.currentTime = 0; }
        };

        /* ===================================================
           LOOPING ANIMASI BERBASIS FISIKA NYATA
        =================================================== */
        function animate() {
            if (!running) return;

            let now = performance.now();
            let dt = (now - lastTime) / 1000; 
            lastTime = now;

            if (dt > 0.1) dt = 0.1; 
            simTime += dt;

            zA -= speedA_ms * dt;
            mobilA.setAttribute("position", `0 0 ${zA}`);

            if (simTime < t_r) {
                currentSpeedB = v0;
            } else {
                if (!brakingActive) {
                    brakingActive = true;
                    statusText.innerHTML = "Status: Rem Diinjak! Ban Slip di Jalan Basah.";
                    statusText.style.color = "#d35400";
                    const brakeSound = document.getElementById("brakeSound");
                    if (brakeSound) brakeSound.play();
                }
                
                currentSpeedB -= (mu * g) * dt; 
                if (currentSpeedB < 0) currentSpeedB = 0;
            }

            zB -= currentSpeedB * dt;
            mobilB.setAttribute("position", `0 0 ${zB}`);

            const camera = document.querySelector("[camera]");
            camera.setAttribute("position", `0 2 ${zB + 6}`);
            if (envSky) envSky.setAttribute("position", `0 0 ${zB}`);
            if (rainEffect) rainEffect.setAttribute("position", `0 0 ${zB}`);

            let currentKmh = currentSpeedB * 3.6;
            speedometer.innerHTML = Math.round(currentKmh) + " km/jam";

            velocityChart.data.labels.push(simTime.toFixed(2));
            velocityChart.data.datasets[0].data.push(currentKmh);
            velocityChart.update('none'); 

            let jarakMobil = zB - zA;

            if (jarakMobil < 1.8) { 
                statusText.innerHTML = "STATUS: TERJADI TABRAKAN! Jarak tidak mencukupi.";
                statusText.style.color = "#c0392b";
                running = false;
            } else if (currentSpeedB === 0) {
                statusText.innerHTML = "STATUS: BERHASIL BERHENTI AMAN!";
                statusText.style.color = "#27ae60";
                running = false;
            }

            if (running) {
                requestAnimationFrame(animate);
            }
        }

        // Inisialisasi Pertama
        calculatePhysics();

        // Pembuatan Marka Jalan
        const container = document.getElementById("markaContainer");
        for (let i = 0; i < 5000; i += 15) {
            let marka = document.createElement("a-box");
            marka.setAttribute("position", `0 -0.97 ${-10 - i}`);
            marka.setAttribute("width", "0.4");
            marka.setAttribute("height", "0.02");
            marka.setAttribute("depth", "6");
            marka.setAttribute("color", "white");
            container.appendChild(marka);
        }
    </script>
</body>
</html>
